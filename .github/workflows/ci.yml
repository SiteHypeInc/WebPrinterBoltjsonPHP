name: CI — Plugin Lint & Validate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: PHP syntax check
        run: php -l webprinter-engine-v4.3.php

      - name: Validate template JSON files
        run: |
          python3 << 'EOF'
          import json, os, sys

          EXCLUDE = {'.git', 'node_modules', 'src'}
          SKIP_FILES = {'tsconfig.json', 'tsconfig.app.json', 'tsconfig.node.json', 'package.json', 'package-lock.json'}
          errors = []

          for root, dirs, files in os.walk('.'):
              dirs[:] = [d for d in dirs if d not in EXCLUDE]
              for fname in files:
                  if not fname.endswith('.json') or fname in SKIP_FILES:
                      continue
                  path = os.path.join(root, fname)
                  try:
                      with open(path) as fh:
                          json.load(fh)
                  except Exception as e:
                      errors.append(f'{path}: {e}')

          if errors:
              for e in errors:
                  print(f'INVALID: {e}')
              sys.exit(1)
          print(f'All template JSON files valid.')
          EOF

      - name: Check template token coverage
        run: |
          python3 << 'EOF'
          import json, os, sys

          REQUIRED_TOKENS = ['[COMPANY NAME]', '[PHONE]', '[CITY, STATE]', '[TRADE]']
          templates = ['Authority-v2', 'Green-v2', 'premium-v2']
          ok = True

          for tmpl in templates:
              home = f'{tmpl}/home.json'
              if not os.path.exists(home):
                  print(f'MISSING: {home}')
                  ok = False
                  continue
              with open(home) as f:
                  content = f.read()
              for token in REQUIRED_TOKENS:
                  if token not in content:
                      print(f'MISSING TOKEN {token} in {home}')
                      ok = False

          if ok:
              print('All templates have required tokens.')
          sys.exit(0 if ok else 1)
          EOF
